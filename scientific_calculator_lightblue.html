<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskJunction – Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&family=Orbitron:wght@700&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  background:#f0f7ff;
  background-image:
    linear-gradient(rgba(14,120,210,0.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(14,120,210,0.06) 1px,transparent 1px);
  background-size:40px 40px;
  font-family:'DM Sans',sans-serif;
  display:flex; flex-direction:column;
}

/* NAV */
nav {
  position:sticky; top:0; z-index:100;
  background:rgba(240,247,255,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(14,120,210,0.18);
  padding:0 24px; height:56px;
  display:flex; align-items:center; justify-content:space-between;
}
.nav-logo {
  font-family:'Orbitron',sans-serif; font-size:15px; font-weight:700;
  letter-spacing:0.05em; color:#0a2540; text-decoration:none;
}
.nav-logo span { color:#2196f3; }
.nav-back-btn {
  display:inline-flex; align-items:center; gap:6px;
  font-family:'Exo 2',sans-serif; font-size:12px; font-weight:600;
  letter-spacing:0.1em; text-transform:uppercase;
  color:#0e78d2; background:rgba(14,120,210,0.08);
  border:1px solid rgba(14,120,210,0.25);
  padding:7px 16px; border-radius:7px;
  text-decoration:none; transition:all 0.2s;
}
.nav-back-btn:hover { background:rgba(14,120,210,0.18); transform:translateX(-2px); }

/* CALC AREA */
.page-body {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:32px 16px 0;
}

/* ORIGINAL CALC STYLES */
.calc-wrap { display:flex; justify-content:center; font-family:'DM Sans',sans-serif; }
.calc { width:340px; background:#e8f4fd; border-radius:24px; padding:20px; box-shadow:0 0 0 1.5px #b0d8f5; }
.display-area { background:#ffffff; border-radius:14px; padding:16px 18px 14px; margin-bottom:16px; min-height:90px; display:flex; flex-direction:column; justify-content:flex-end; align-items:flex-end; overflow:hidden; box-shadow:0 0 0 1px #c8e6f8; }
.expr-line { font-family:'Space Mono',monospace; font-size:13px; color:#90bcd8; min-height:18px; word-break:break-all; text-align:right; margin-bottom:4px; }
.result-line { font-family:'Space Mono',monospace; font-size:28px; font-weight:700; color:#1a5a8a; word-break:break-all; text-align:right; line-height:1.1; }
.mode-bar { display:flex; gap:6px; margin-bottom:14px; }
.mode-btn { flex:1; padding:7px 0; border-radius:8px; border:1px solid #b0d8f5; background:transparent; color:#6aaad4; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; transition:all 0.15s; letter-spacing:0.02em; }
.mode-btn.active { background:#ffffff; border-color:#5aaae0; color:#1a72b8; }
.grid { display:grid; gap:8px; }
.grid-sci { grid-template-columns:repeat(5,1fr); }
.grid-main { grid-template-columns:repeat(4,1fr); margin-top:8px; }
.btn { border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:400; cursor:pointer; transition:all 0.1s; padding:0; height:48px; display:flex; align-items:center; justify-content:center; letter-spacing:0.01em; }
.btn:active { transform:scale(0.94); }
.btn-sci { background:#d0eaf8; color:#3a88c0; font-size:12px; height:40px; }
.btn-sci:hover { background:#c0e0f5; color:#1a6aaa; }
.btn-num { background:#ffffff; color:#1a4a7a; box-shadow:0 0 0 1px #c8e6f8; }
.btn-num:hover { background:#f0f8ff; }
.btn-op { background:#c8e8f8; color:#1a72b8; }
.btn-op:hover { background:#b8dcf5; }
.btn-eq { background:#1a82d0; color:#ffffff; font-weight:500; }
.btn-eq:hover { background:#1472c0; }
.btn-clear { background:#fce8e8; color:#d04040; }
.btn-clear:hover { background:#f8d8d8; }
.btn-zero { grid-column:span 2; }
.angle-chip { font-size:11px; text-align:right; margin-bottom:8px; font-family:'Space Mono',monospace; cursor:pointer; user-select:none; }
.angle-chip span { background:#d0eaf8; border:1px solid #b0d8f5; border-radius:5px; padding:2px 8px; color:#6aaad4; }
.angle-chip span.active-angle { border-color:#5aaae0; color:#1a72b8; background:#ffffff; }

/* FOOTER */
footer {
  text-align:center; padding:28px 16px 32px;
  display:flex; flex-direction:column; align-items:center; gap:6px;
}
.footer-divider { width:100px; height:1px; background:linear-gradient(90deg,transparent,rgba(14,120,210,0.4),transparent); margin-bottom:4px; }
.footer-label { font-family:'Exo 2',sans-serif; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:#7fabd1; }
.footer-name { font-family:'Orbitron',sans-serif; font-size:14px; font-weight:700; letter-spacing:0.06em; color:#0e78d2; }
.footer-copy { font-family:'Exo 2',sans-serif; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:#a0bdd6; margin-top:2px; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Task<span>Junction</span></a>
  <a href="index.html" class="nav-back-btn">← Home</a>
</nav>

<div class="page-body">
  <div class="calc-wrap">
    <div class="calc">
      <div class="display-area">
        <div class="expr-line" id="expr"></div>
        <div class="result-line" id="result">0</div>
      </div>
      <div class="angle-chip">
        <span id="deg-btn" class="active-angle" onclick="setAngle('deg')">DEG</span>
        <span id="rad-btn" onclick="setAngle('rad')">RAD</span>
      </div>
      <div class="mode-bar">
        <button class="mode-btn active" id="mode-basic" onclick="setMode('basic')">Basic</button>
        <button class="mode-btn" id="mode-sci" onclick="setMode('sci')">Scientific</button>
        <button class="mode-btn" id="mode-trig" onclick="setMode('trig')">Trig</button>
      </div>
      <div class="grid grid-sci" id="sci-grid"></div>
      <div class="grid grid-main">
        <button class="btn btn-clear" onclick="press('clear')">AC</button>
        <button class="btn btn-clear" onclick="press('backspace')">⌫</button>
        <button class="btn btn-op" onclick="press('%')">%</button>
        <button class="btn btn-op" onclick="press('/')">÷</button>
        <button class="btn btn-num" onclick="press('7')">7</button>
        <button class="btn btn-num" onclick="press('8')">8</button>
        <button class="btn btn-num" onclick="press('9')">9</button>
        <button class="btn btn-op" onclick="press('*')">×</button>
        <button class="btn btn-num" onclick="press('4')">4</button>
        <button class="btn btn-num" onclick="press('5')">5</button>
        <button class="btn btn-num" onclick="press('6')">6</button>
        <button class="btn btn-op" onclick="press('-')">−</button>
        <button class="btn btn-num" onclick="press('1')">1</button>
        <button class="btn btn-num" onclick="press('2')">2</button>
        <button class="btn btn-num" onclick="press('3')">3</button>
        <button class="btn btn-op" onclick="press('+')">+</button>
        <button class="btn btn-num btn-zero" onclick="press('0')">0</button>
        <button class="btn btn-num" onclick="press('.')">.</button>
        <button class="btn btn-eq" onclick="press('=')">=</button>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-divider"></div>
  <div class="footer-label">Crafted by</div>
  <div class="footer-name">Vaibhav Dhokpande</div>
  <div class="footer-copy">© 2025 · TaskJunction</div>
</footer>

<script>
const sciSets = {
  basic: [],
  sci: [
    {label:'x²',val:'sq'},{label:'xⁿ',val:'pow'},{label:'√',val:'sqrt'},{label:'∛',val:'cbrt'},{label:'1/x',val:'inv'},
    {label:'ln',val:'ln'},{label:'log',val:'log'},{label:'eˣ',val:'exp'},{label:'10ˣ',val:'10x'},{label:'|x|',val:'abs'},
    {label:'π',val:'pi'},{label:'e',val:'e'},{label:'(',val:'('},{label:')',val:')'},{label:'n!',val:'fact'},
  ],
  trig: [
    {label:'sin',val:'sin'},{label:'cos',val:'cos'},{label:'tan',val:'tan'},{label:'cot',val:'cot'},{label:'π',val:'pi'},
    {label:'sin⁻¹',val:'asin'},{label:'cos⁻¹',val:'acos'},{label:'tan⁻¹',val:'atan'},{label:'cot⁻¹',val:'acot'},{label:'e',val:'e'},
    {label:'sinh',val:'sinh'},{label:'cosh',val:'cosh'},{label:'tanh',val:'tanh'},{label:'(',val:'('},{label:')',val:')'},
  ]
};
let expr='', mode='basic', angleMode='deg', justEvaled=false;
function toRad(x){return angleMode==='deg'?x*Math.PI/180:x;}
function fromRad(x){return angleMode==='deg'?x*180/Math.PI:x;}
function factorial(n){n=Math.round(n);if(n<0)return NaN;if(n<=1)return 1;let r=1;for(let i=2;i<=n;i++)r*=i;return r;}
function renderSci(){const g=document.getElementById('sci-grid');const btns=sciSets[mode];g.innerHTML=btns.map(b=>`<button class="btn btn-sci" onclick="pressFn('${b.val}')">${b.label}</button>`).join('');g.style.display=btns.length?'grid':'none';}
function setMode(m){mode=m;['basic','sci','trig'].forEach(id=>{document.getElementById('mode-'+id).classList.toggle('active',id===m);});renderSci();}
function setAngle(a){angleMode=a;document.getElementById('deg-btn').classList.toggle('active-angle',a==='deg');document.getElementById('rad-btn').classList.toggle('active-angle',a==='rad');}
function updateDisplay(){document.getElementById('expr').textContent=expr||'';}
function press(val){const ops=['+','-','*','/','^'];if(val==='clear'){expr='';document.getElementById('result').textContent='0';updateDisplay();justEvaled=false;return;}if(val==='backspace'){if(justEvaled){expr='';document.getElementById('result').textContent='0';justEvaled=false;}else{expr=expr.slice(0,-1);}updateDisplay();return;}if(val==='='){evaluate();return;}if(justEvaled&&!ops.includes(val)){expr='';justEvaled=false;}if(val==='%'){expr+='/100';updateDisplay();return;}expr+=val;updateDisplay();}
function pressFn(fn){if(justEvaled&&fn!=='pi'&&fn!=='e'){justEvaled=false;}switch(fn){case 'sq':expr+='**2';break;case 'pow':expr+='**';break;case 'sqrt':expr+='Math.sqrt(';break;case 'cbrt':expr+='Math.cbrt(';break;case 'inv':expr+='1/(';break;case 'ln':expr+='Math.log(';break;case 'log':expr+='Math.log10(';break;case 'exp':expr+='Math.exp(';break;case '10x':expr+='10**(';break;case 'abs':expr+='Math.abs(';break;case 'pi':expr+='Math.PI';break;case 'e':expr+='Math.E';break;case '(':expr+='(';break;case ')':expr+=')';break;case 'fact':expr+='_fact(';break;case 'sin':expr+='_sin(';break;case 'cos':expr+='_cos(';break;case 'tan':expr+='_tan(';break;case 'cot':expr+='_cot(';break;case 'asin':expr+='_asin(';break;case 'acos':expr+='_acos(';break;case 'atan':expr+='_atan(';break;case 'acot':expr+='_acot(';break;case 'sinh':expr+='Math.sinh(';break;case 'cosh':expr+='Math.cosh(';break;case 'tanh':expr+='Math.tanh(';break;}updateDisplay();}
function evaluate(){if(!expr)return;try{const safe=expr.replace(/_sin\(/g,'Math.sin(__toRad(').replace(/_cos\(/g,'Math.cos(__toRad(').replace(/_tan\(/g,'Math.tan(__toRad(').replace(/_cot\(/g,'(1/Math.tan(__toRad(').replace(/_asin\(/g,'__fromRad(Math.asin(').replace(/_acos\(/g,'__fromRad(Math.acos(').replace(/_atan\(/g,'__fromRad(Math.atan(').replace(/_acot\(/g,'__fromRad(Math.PI/2-Math.atan(').replace(/_fact\(/g,'__factorial(');const fn=new Function('__toRad','__fromRad','__factorial','"use strict";return ('+safe+')');let val=fn(toRad,fromRad,factorial);if(!isFinite(val))throw new Error('Infinity');const display=parseFloat(val.toPrecision(10)).toString();document.getElementById('result').textContent=display;document.getElementById('expr').textContent=expr+' =';expr=display;justEvaled=true;}catch(e){document.getElementById('result').textContent='Error';document.getElementById('expr').textContent=expr;expr='';justEvaled=false;}}
renderSci();
</script>
</body>
</html>
